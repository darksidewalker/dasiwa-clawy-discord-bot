# docker-compose.truenas.yml — TrueNAS SCALE
# ─────────────────────────────────────────────────────────────────────
# SETUP — replace these placeholders before deploying:
#   <pool>             → your TrueNAS pool name (e.g. VM)
#   YOUR_TOKEN_HERE    → your Discord bot token
#   192.168.1.x:12345 → your Ollama host IP and port
#
# HOW IT WORKS:
#   First start: container writes default config files into your dataset.
#   You then edit them directly on the host (via SMB/SSH/TrueNAS shell).
#   Subsequent starts: existing files are left untouched.
#   The bot warns in logs if guild_id / owner_id are still 0.
# ─────────────────────────────────────────────────────────────────────

services:
  clawy:
    image: darksidewalker/dasiwa-clawy-discord-bot:latest
    container_name: clawy
    restart: unless-stopped

    environment:
      - DISCORD_TOKEN=YOUR_TOKEN_HERE
      - OLLAMA_URL=http://192.168.1.x:12345

    volumes:
      # Both volumes are read-write.
      # config/ — bot writes defaults here on first start, you edit them after.
      # data/   — SQLite database lives here.
      - /mnt/<pool>/clawy/config:/app/config
      - /mnt/<pool>/clawy/data:/app/data

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
