# ---- Discord ----
guild_id: 0                  # REQUIRED: right-click your server -> Copy Server ID (dev mode)
owner_id: 0                  # REQUIRED: your Discord user ID — the bot will never act on you
log_channel_id: 0            # optional: channel ID for moderation logs (0 = disabled)
command_prefix: "!"

# ---- Bot mode ----
# moderate_only  = silent observer + moderator. Never speaks unless a rule is broken or warning is needed.
# chat_and_moderate = moderates AND will reply when @mentioned or when a direct question is asked.
# chat_only      = chats when addressed, never moderates (useful for testing persona).
mode: "chat_and_moderate"

# ---- Address matching ----
# If true, the bot ALSO responds when called by the active persona's name.
# If false (default), only the bot's Discord display name + @mention work.
respond_to_persona_name: false

# ---- Storage ----
database:
  path: "data/bot.db"          # SQLite file (WAL mode)
  chat_keep_last_turns: 50     # per-user memory size for chat
  chat_context_turns: 8        # how many past turns to feed the LLM when chatting

# Roles the bot must never touch (kick/ban/timeout/role-change).
protected_roles:
  - "Admin"
  - "Moderator"
  - "Owner"

# Channels the bot should ignore entirely (no reading, no replying).
ignored_channels:
  - "staff-only"

# ---- Persona is in config/personas.json ----
# Edit that file to add/change personas. Or use !persona and !mood in chat.

# ---- Ollama ----
# Tuned for persona chat (moods, 1-5 sentence replies) on CPU-only servers.
# See README for model recommendations per hardware tier.
ollama:
  model: "gemma3:e2b"         # 2B model — small but coherent for chat/persona
  temperature: 0.85           # 2B models tend toward dry/repetitive — lift slightly for personality
  num_ctx: 4096               # MUST be ≥ persona + 8 history turns + system prompt; 512 silently truncates
  num_predict: 320            # max tokens per reply (Ollama default 128 = ~2 short sentences)
  timeout_seconds: 30         # 2B is fast on CPU but give it room
  think: false                # Enable or Disable the thinking mode of a model

# ---- Moderation ----
moderation:
  # Enable automatic muting from the hard blocklist (see blocklist_file below).
  # If false (default), the blocklist is ignored entirely — the bot will not
  # auto-mute anyone based on word matches. You can still moderate via the LLM
  # or manually with !mute / !kick / !ban.
  blocklist_enabled: false

  # Optional JSON file with words/phrases that trigger automatic muting.
  # Only read if blocklist_enabled: true above. See config/blocklist.json.example
  blocklist_file: "config/blocklist.json"

  proactive_reply_cooldown_seconds: 300
  proactive_reply_chance: 0.0
  default_timeout_seconds: 600
  strike_window_hours: 24
  spam_threshold: 6            # messages in window that trigger spam warning
  spam_window_seconds: 10
  spam_strike_threshold: 3     # total strikes within strike_window_hours that escalate spam from warn → timeout (with delete). Counts ALL prior mod events (warn/timeout/delete/kick/strike), not just spam.
  spam_timeout_seconds: 600    # mute duration when spam escalates

  # ---- Mention rate limit (how often a user can @mention the bot) ----
  mention_max: 4               # max @mentions allowed within the window
  mention_window_seconds: 30   # sliding window size in seconds
  mention_reset_seconds: 120   # seconds of quiet before strikes reset
  mention_timeout_seconds: 300 # mute duration on escalation (5 minutes)

# ---- Move command ----
move:
  max_batch: 25                # max messages moved in one command (safety cap)
  post_notice: true            # post "moved from #x by @admin" in destination

# ---- Actions the LLM is allowed to pick autonomously ----
# Kick and ban are intentionally absent — the LLM can never execute them.
# If the LLM tries to pick kick/ban, it is flagged for human review instead.
# Use !kick and !ban commands manually after reviewing the log channel.
allowed_actions:
  - reply
  - delete
  - warn
  - timeout
  - assign_role
  - remove_role
  - ignore

# ---- Autonomous timeout cap ----
# Even when the LLM picks "timeout", it is clamped to this maximum.
# Longer mutes require a human via !mute @user <duration>.
max_autonomous_timeout_seconds: 600   # 10 minutes hard cap

chat:
  # Role allowlist — which roles can chat with Clawy.
  #
  # Empty list = everyone can chat (current default behavior).
  # Non-empty list = ONLY members of those roles get chat replies.
  #
  # Moderation still applies to everyone regardless of this list.
  # Role names are case-sensitive — they must match Discord exactly.
  allowed_roles:
    - "Member"


  # Quiet hours — scheduled silence for the chat pipeline.
  #
  # During quiet hours:
  #   - Clawy ignores @mentions and direct addresses (silent reply).
  #   - Proactive replies are suppressed.
  #   - Moderation / prefilter / blocklist / rate limiting keep running.
  #   - Role-grant engine keeps running.
  #
  # Use !quiet on|off at runtime to toggle without editing this file.
  quiet_hours:
    enabled: false
    timezone: "Europe/Berlin"    # IANA timezone name (zoneinfo)
    start: "22:00"               # 24h format, HH:MM
    end: "07:00"                 # wraps midnight correctly (23:00-07:00)