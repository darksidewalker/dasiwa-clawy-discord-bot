services:
  clawy:
    build: .
    image: dasiwa-clawy-discord-bot:latest
    container_name: clawy
    restart: unless-stopped

    # ── Token ─────────────────────────────────────────────────────────
    # Option A: mount a .env file (recommended — keeps token out of compose)
    # Option B: set it directly here as an environment variable (less secure)
    #
    # Option A (default — comment out if using B):
    # volumes include .env mount below
    #
    # Option B — uncomment and fill in:
    # environment:
    #   - DISCORD_TOKEN=your-token-here
    #   - OLLAMA_URL=http://192.168.1.x:11434

    # ── Volumes ───────────────────────────────────────────────────────
    # config/ is read-only — edit on the host, restart to apply.
    # data/   is read-write — SQLite database lives here.
    # .env    is read-only — your Discord token.
    #
    # If config/ is empty on first start, the container seeds it from
    # the baked-in defaults automatically.
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./.env:/app/.env:ro

    # ── Ollama ────────────────────────────────────────────────────────
    # Ollama runs OUTSIDE the container on the host.
    # host.docker.internal = Docker Desktop (Mac/Windows)
    # 172.17.0.1           = Linux native Docker (default bridge IP)
    # 192.168.1.x          = direct LAN IP (always works, recommended)
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
