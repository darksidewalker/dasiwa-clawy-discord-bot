services:
  clawy:
    build: .
    image: clawy-bot:latest
    container_name: clawy

    restart: unless-stopped

    # ── Volumes ───────────────────────────────────────────────────────
    # config/ — your config.yaml, personas.json, role_rules.json
    # data/   — SQLite database (bot.db)
    # .env    — your Discord token and Ollama URL
    volumes:
      - ./config:/app/config:ro        # read-only — bot reads config, never writes it
      - ./data:/app/data                # read-write — SQLite database lives here
      - ./.env:/app/.env:ro            # read-only — secrets file

    # ── Networking ────────────────────────────────────────────────────
    # No ports exposed — the bot connects OUT to Discord and Ollama.
    # Ollama runs on the host machine outside Docker.
    # Use host.docker.internal (Docker Desktop) or the host's LAN IP.
    #
    # Override OLLAMA_URL here if you don't want to put it in .env:
    # environment:
    #   - OLLAMA_URL=http://host.docker.internal:11434

    # ── Logging ───────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # ── Health ────────────────────────────────────────────────────────
    # The bot has no HTTP server, so we just check the process is alive.
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
