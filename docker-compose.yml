services:
  clawy:
    build: .
    image: dasiwa-clawy-discord-bot:latest
    container_name: clawy
    restart: unless-stopped

    # ── Configuration ────────────────────────────────────────────────
    # Two ways to configure, pick whichever you prefer:
    #
    #   A) Mount a .env file (recommended — keeps the token out of compose).
    #      Uncomment the .env line under `volumes:` below.
    #
    #   B) Set environment variables directly here.
    #      Uncomment the block below. Values here OVERRIDE whatever is in
    #      .env AND whatever is in config/config.yaml.
    #
    # If DISCORD_TOKEN is missing or a placeholder on startup, the container
    # stays alive and polls every 10 s — drop a .env on the volume or add
    # the env var + restart, and it continues automatically.

    environment:
      # Ollama location — see .env.example for host-vs-container guidance.
      - OLLAMA_URL=http://host.docker.internal:11434

      # Uncomment + fill in to configure entirely via compose:
      # - DISCORD_TOKEN=your-token-here
      # - GUILD_ID=0
      # - OWNER_ID=0
      # - LOG_CHANNEL_ID=0
      # - OLLAMA_MODEL=qwen3:8b
      # - BOT_MODE=chat_and_moderate

    volumes:
      # Config — writable so first-start seeding and env overrides work.
      # Edit files on the host and restart to apply non-env changes.
      - ./config:/app/config

      # Runtime data — SQLite database lives here.
      - ./data:/app/data

      # Uncomment to load your token from a .env file on the host:
      - ./.env:/app/.env:ro

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
